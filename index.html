<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NDA Hypothesis Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header span.badge {
      font-size: 0.7rem;
      background: #3a86ff;
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    #loading {
      text-align: center;
      padding: 4rem;
      color: #666;
      font-size: 1rem;
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #ddd;
      border-top-color: #3a86ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .controls {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
    }

    .controls label {
      font-weight: 600;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    .select-wrapper {
      position: relative;
      flex: 1;
      min-width: 220px;
    }

    .select-wrapper::after {
      content: "▾";
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #555;
      font-size: 0.8rem;
    }

    select {
      width: 100%;
      appearance: none;
      background: #f5f6fa;
      border: 1.5px solid #dde1ea;
      border-radius: 7px;
      padding: 0.55rem 2.25rem 0.55rem 0.85rem;
      font-size: 0.875rem;
      color: #1a1a2e;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus { border-color: #3a86ff; background: #fff; }

    .doc-count {
      font-size: 0.8rem;
      color: #888;
      white-space: nowrap;
    }

    #results {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .results-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #eef0f5;
      font-size: 0.8rem;
      color: #666;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .results-header strong {
      color: #1a1a2e;
      font-size: 0.9rem;
    }

    .summary-pills {
      display: flex;
      gap: 0.5rem;
    }

    .pill {
      font-size: 0.72rem;
      font-weight: 600;
      border-radius: 99px;
      padding: 2px 9px;
    }
    .pill.e { background: #d4edda; color: #155724; }
    .pill.c { background: #f8d7da; color: #721c24; }
    .pill.n { background: #e9ecef; color: #495057; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f8f9fc;
      padding: 0.75rem 1.25rem;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      font-weight: 600;
      border-bottom: 1px solid #eef0f5;
    }

    tbody tr {
      border-bottom: 1px solid #f2f3f7;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8f9fc; }

    td {
      padding: 0.875rem 1.25rem;
      font-size: 0.875rem;
      vertical-align: top;
    }

    td.desc {
      font-weight: 600;
      color: #1a1a2e;
      white-space: nowrap;
      width: 1%;
    }

    td.hypo {
      color: #444;
      line-height: 1.5;
    }

    td.choice { width: 1%; white-space: nowrap; }

    .choice-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 5px;
      padding: 3px 10px;
      letter-spacing: 0.02em;
    }

    .choice-badge.entailment    { background: #d4edda; color: #155724; }
    .choice-badge.contradiction { background: #f8d7da; color: #721c24; }
    .choice-badge.notmentioned  { background: #e9ecef; color: #495057; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #aaa;
      font-size: 0.9rem;
    }

    .empty-state svg {
      display: block;
      margin: 0 auto 1rem;
      opacity: 0.3;
    }

    #app { display: none; }
  </style>
</head>
<body>

<header>
  <h1>NDA Hypothesis Review</h1>
  <span class="badge">ContractNLI</span>
</header>

<main>
  <div id="loading"><span class="spinner"></span>Loading data…</div>

  <div id="app">
    <div class="controls">
      <label for="file-select">Document</label>
      <div class="select-wrapper">
        <select id="file-select">
          <option value="">— select a document —</option>
        </select>
      </div>
      <span class="doc-count" id="doc-count"></span>
    </div>

    <div id="results">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Select a document to view its hypotheses.
      </div>
    </div>
  </div>
</main>

<script>
  let appData = null;

  async function init() {
    const resp = await fetch('app_data.json');
    appData = await resp.json();

    const select = document.getElementById('file-select');
    const fileNames = Object.keys(appData.documents).sort((a, b) =>
      a.localeCompare(b, undefined, { sensitivity: 'base' })
    );

    for (const name of fileNames) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    }

    document.getElementById('doc-count').textContent = `${fileNames.length} documents`;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    select.addEventListener('change', () => {
      if (select.value) renderTable(select.value);
      else resetTable();
    });
  }

  function sortedHypothesisIds(labels) {
    return Object.keys(labels).sort((a, b) => {
      const n = x => parseInt(x.replace('nda-', ''), 10);
      return n(a) - n(b);
    });
  }

  function renderTable(fileName) {
    const annotations = appData.documents[fileName];
    const labels = appData.labels;
    const ids = sortedHypothesisIds(labels);

    let entCount = 0, conCount = 0, notCount = 0;
    const rows = ids.map(id => {
      const label = labels[id];
      const choice = annotations[id] || 'NotMentioned';
      if (choice === 'Entailment') entCount++;
      else if (choice === 'Contradiction') conCount++;
      else notCount++;

      const cls = choice.toLowerCase().replace('notmentioned', 'notmentioned');
      return `<tr>
        <td class="desc">${escHtml(label.short_description)}</td>
        <td class="hypo">${escHtml(label.hypothesis)}</td>
        <td class="choice"><span class="choice-badge ${cls}">${escHtml(choice)}</span></td>
      </tr>`;
    }).join('');

    document.getElementById('results').innerHTML = `
      <div class="results-header">
        <strong>${escHtml(fileName)}</strong>
        <div class="summary-pills">
          <span class="pill e">${entCount} Entailment</span>
          <span class="pill c">${conCount} Contradiction</span>
          <span class="pill n">${notCount} Not Mentioned</span>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Short Description</th>
            <th>Hypothesis</th>
            <th>Choice</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function resetTable() {
    document.getElementById('results').innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Select a document to view its hypotheses.
      </div>`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init().catch(err => {
    document.getElementById('loading').innerHTML = `<span style="color:#c00">Failed to load data: ${err.message}</span>`;
  });
</script>

</body>
</html>
